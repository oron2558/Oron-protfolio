<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&amp;display=swap');
      .handwritten { font-family: 'Caveat', cursive; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="600" height="500" fill="#faf9f6"/>

  <!-- The big tangled scribble line in the center -->
  <g fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.75">
    <!-- Main tangled mess - one long continuous chaotic path -->
    <path d="
      M 180,200
      C 210,140 280,130 300,180
      C 320,230 250,260 290,220
      C 330,180 370,140 350,200
      C 330,260 280,280 320,260
      C 360,240 400,200 380,250
      C 360,300 300,310 340,290
      C 380,270 420,230 400,280
      C 380,330 320,340 360,320
      C 400,300 430,260 420,310
      C 410,360 350,370 380,350
      C 410,330 440,300 430,340
      C 420,380 370,390 400,370
      C 430,350 260,350 240,300
      C 220,250 260,200 230,240
      C 200,280 240,320 220,290
      C 200,260 170,240 200,220
      C 230,200 270,240 250,280
      C 230,320 200,330 220,310
      C 240,290 280,300 260,330
      C 240,360 210,350 230,340
      C 250,330 290,340 270,360
      C 250,380 310,380 330,360
      C 350,340 310,300 340,330
      C 370,360 350,390 320,380
      C 290,370 310,350 340,370
    " stroke="#3a3a3a"/>

    <!-- Second layer of tangles for more density -->
    <path d="
      M 250,180
      C 280,160 330,170 310,210
      C 290,250 260,230 300,240
      C 340,250 360,220 340,260
      C 320,300 280,290 310,280
      C 340,270 370,290 350,310
      C 330,330 290,320 320,310
      C 350,300 380,320 360,340
      C 340,360 300,350 330,340
      C 360,330 390,350 370,360
    " stroke="#555" stroke-width="2" opacity="0.6"/>

    <!-- Third smaller inner tangle -->
    <path d="
      M 290,230
      C 310,210 340,230 320,250
      C 300,270 280,260 310,260
      C 340,260 350,280 330,290
      C 310,300 290,290 310,280
      C 330,270 350,300 330,310
      C 310,320 290,310 310,300
    " stroke="#777" stroke-width="1.8" opacity="0.5"/>
  </g>

  <!-- Small loose ends sticking out of the tangle -->
  <g fill="none" stroke="#3a3a3a" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <path d="M 180,200 C 160,185 145,190 135,178"/>
    <path d="M 340,370 C 355,395 370,405 385,400"/>
    <path d="M 250,180 C 235,155 220,148 210,135"/>
    <path d="M 370,360 C 395,375 410,385 425,378"/>
    <path d="M 200,220 C 175,210 160,220 148,215"/>
    <path d="M 430,340 C 450,345 460,338 470,342"/>
  </g>

  <!-- Handwritten labels around the tangle -->

  <!-- Top left - "Follow-ups" -->
  <text x="70" y="110" class="handwritten" fill="#c0392b" font-size="26" transform="rotate(-8, 70, 110)">follow-ups</text>
  <text x="85" y="135" class="handwritten" fill="#c0392b" font-size="16" opacity="0.5" transform="rotate(-5, 85, 135)">?? when ??</text>

  <!-- Top right - "Sales" -->
  <text x="420" y="120" class="handwritten" fill="#2980b9" font-size="28" transform="rotate(5, 420, 120)">sales</text>
  <text x="435" y="148" class="handwritten" fill="#2980b9" font-size="15" opacity="0.5" transform="rotate(3, 435, 148)">closing deals...</text>

  <!-- Left - "Leads" -->
  <text x="30" y="280" class="handwritten" fill="#8e44ad" font-size="27" transform="rotate(-12, 30, 280)">leads</text>
  <text x="38" y="308" class="handwritten" fill="#8e44ad" font-size="15" opacity="0.5" transform="rotate(-10, 38, 308)">who called?</text>

  <!-- Right - "Quotes" -->
  <text x="470" y="260" class="handwritten" fill="#e67e22" font-size="26" transform="rotate(7, 470, 260)">quotes</text>
  <text x="468" y="288" class="handwritten" fill="#e67e22" font-size="15" opacity="0.5" transform="rotate(4, 468, 288)">did I send it?</text>

  <!-- Bottom left - "Service" -->
  <text x="60" y="420" class="handwritten" fill="#27ae60" font-size="27" transform="rotate(-6, 60, 420)">service</text>
  <text x="55" y="448" class="handwritten" fill="#27ae60" font-size="15" opacity="0.5" transform="rotate(-3, 55, 448)">tickets piling up</text>

  <!-- Bottom right - "Invoices" -->
  <text x="430" y="430" class="handwritten" fill="#c0392b" font-size="24" transform="rotate(9, 430, 430)">invoices</text>
  <text x="432" y="455" class="handwritten" fill="#c0392b" font-size="14" opacity="0.5" transform="rotate(6, 432, 455)">overdue!!</text>

  <!-- Small arrows pointing from labels toward the tangle -->
  <g fill="none" stroke="#999" stroke-width="1.2" stroke-linecap="round" opacity="0.4">
    <!-- from follow-ups -->
    <path d="M 150,125 C 165,145 175,165 185,185"/>
    <!-- from sales -->
    <path d="M 430,150 C 410,170 390,185 370,195"/>
    <!-- from leads -->
    <path d="M 110,280 C 135,275 160,265 180,255"/>
    <!-- from quotes -->
    <path d="M 465,270 C 445,275 430,285 415,300"/>
    <!-- from service -->
    <path d="M 135,415 C 165,400 195,380 220,355"/>
    <!-- from invoices -->
    <path d="M 430,420 C 410,405 390,385 370,370"/>
  </g>

  <!-- Small question marks and exclamation scattered -->
  <g class="handwritten" fill="#cc3333" opacity="0.35" font-size="20">
    <text x="175" y="155" transform="rotate(-20, 175, 155)">?</text>
    <text x="395" y="170" transform="rotate(15, 395, 170)">!</text>
    <text x="155" y="340" transform="rotate(-10, 155, 340)">?!</text>
    <text x="440" y="340" transform="rotate(12, 440, 340)">??</text>
    <text x="300" y="140" transform="rotate(5, 300, 140)">!</text>
    <text x="200" y="400" transform="rotate(-8, 200, 400)">?</text>
    <text x="410" y="390" transform="rotate(18, 410, 390)">!</text>
  </g>

  <!-- Small "x" marks for chaos -->
  <g class="handwritten" fill="#999" opacity="0.25" font-size="14">
    <text x="160" y="175">x</text>
    <text x="410" y="195">x</text>
    <text x="145" y="315">x</text>
    <text x="435" y="315">x</text>
    <text x="190" y="380">x</text>
    <text x="400" y="380">x</text>
  </g>

</svg>