<head>

  <style>
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-primary);
      min-height: 100vh;
    }

    /* ==================== RESUME LAYOUT ==================== */

    .resume {
      max-width: 900px;
      margin: 0 auto;
      padding: 120px 32px 80px;
    }

    /* Header */
    .resume-header {
      margin-bottom: 56px;
    }

    .resume-name {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      color: var(--text-white);
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 8px;
    }

    .resume-role {
      font-size: clamp(1.1rem, 2.5vw, 1.4rem);
      color: var(--accent-light);
      font-weight: 600;
      margin-bottom: 20px;
    }

    .resume-contact {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .resume-contact a {
      color: var(--text-secondary);
      transition: color 0.2s;
    }

    .resume-contact a:hover {
      color: var(--accent-light);
    }

    .resume-contact__item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .resume-contact__item svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      stroke: var(--text-muted);
    }

    /* Divider */
    .resume-divider {
      height: 1px;
      background: var(--border-subtle);
      margin: 40px 0;
    }

    /* Section */
    .resume-section {
      margin-bottom: 48px;
    }

    .resume-section__title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--netflix-red);
      margin-bottom: 24px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-subtle);
    }

    /* Summary */
    .resume-summary {
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--text-secondary);
      max-width: 780px;
    }

    .resume-summary strong {
      color: var(--text-white);
      font-weight: 600;
    }

    /* Experience item */
    .resume-exp {
      margin-bottom: 36px;
      position: relative;
      padding-left: 20px;
      border-left: 2px solid var(--border-subtle);
    }

    .resume-exp:last-child {
      margin-bottom: 0;
    }

    .resume-exp::before {
      content: '';
      position: absolute;
      left: -5px;
      top: 6px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    .resume-exp__header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 4px;
    }

    .resume-exp__title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-white);
    }

    .resume-exp__date {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 500;
      white-space: nowrap;
    }

    .resume-exp__company {
      font-size: 0.9rem;
      color: var(--accent-light);
      font-weight: 500;
      margin-bottom: 12px;
    }

    .resume-exp__list {
      list-style: none;
      padding: 0;
    }

    .resume-exp__list li {
      position: relative;
      padding-left: 16px;
      margin-bottom: 8px;
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    .resume-exp__list li::before {
      content: '›';
      position: absolute;
      left: 0;
      color: var(--text-muted);
      font-weight: 700;
    }

    /* Education */
    .resume-edu {
      margin-bottom: 24px;
      padding-left: 20px;
      border-left: 2px solid var(--border-subtle);
      position: relative;
    }

    .resume-edu::before {
      content: '';
      position: absolute;
      left: -5px;
      top: 6px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    .resume-edu__name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-white);
      margin-bottom: 2px;
    }

    .resume-edu__detail {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* Skills grid */
    .resume-skills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .resume-skill {
      padding: 8px 18px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-primary);
      transition: border-color 0.2s, background 0.2s;
    }

    .resume-skill:hover {
      border-color: var(--accent);
      background: var(--bg-card-hover);
    }

    .resume-skill--primary {
      background: var(--accent-glow);
      border-color: rgba(59, 130, 246, 0.3);
      color: var(--accent-light);
    }

    /* Languages */
    .resume-langs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .resume-lang {
      padding: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      text-align: center;
    }

    .resume-lang__name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-white);
      margin-bottom: 4px;
    }

    .resume-lang__level {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* SaaS Product callout */
    .resume-product {
      background: var(--bg-card);
      border: 1px solid var(--border-hover);
      border-radius: 12px;
      padding: 28px 32px;
      margin-top: 12px;
    }

    .resume-product__badge {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(229, 9, 20, 0.15);
      border: 1px solid rgba(229, 9, 20, 0.3);
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #ff6b6b;
      margin-bottom: 12px;
    }

    .resume-product__title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-white);
      margin-bottom: 8px;
    }

    .resume-product__desc {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    /* CTA */
    .resume-cta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 48px;
    }

    .resume-cta__btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 700;
      transition: all 0.2s;
    }

    .resume-cta__btn--primary {
      background: var(--text-white);
      color: #111;
    }

    .resume-cta__btn--primary:hover {
      background: rgba(255,255,255,0.85);
    }

    .resume-cta__btn--secondary {
      background: var(--bg-card);
      color: var(--text-white);
      border: 1px solid var(--border-hover);
    }

    .resume-cta__btn--secondary:hover {
      background: var(--bg-card-hover);
      border-color: var(--accent);
    }

    .resume-cta__btn svg {
      width: 18px;
      height: 18px;
    }

    /* Print styles */
    @media print {
      .onf-nav, .resume-cta { display: none; }
      .resume { padding-top: 20px; }
      body { background: #fff; color: #111; }
      .resume-name, .resume-exp__title, .resume-edu__name,
      .resume-lang__name, .resume-product__title { color: #111; }
      .resume-role { color: #3b82f6; }
      .resume-section__title { color: #e50914; }
      .resume-exp, .resume-edu { border-color: #ddd; }
      .resume-exp::before, .resume-edu::before { background: #3b82f6; }
      .resume-product { border-color: #ddd; background: #f9f9f9; }
      .resume-skill { background: #f0f0f0; border-color: #ddd; color: #333; }
      .resume-lang { background: #f9f9f9; border-color: #ddd; }
    }

    /* ==================== LIGHT MODE ==================== */
    [data-theme="light"] .resume-summary,
    [data-theme="light"] .resume-exp__list li,
    [data-theme="light"] .resume-product__desc {
      color: #4a4a5a;
    }

    [data-theme="light"] .resume-contact {
      color: #5a5a6a;
    }

    [data-theme="light"] .resume-contact a {
      color: #5a5a6a;
    }

    [data-theme="light"] .resume-skill {
      background: #f0f0f5;
      color: #333;
      border-color: #ddd;
    }

    [data-theme="light"] .resume-lang {
      background: #f5f5fa;
      border-color: #ddd;
    }

    [data-theme="light"] .resume-product {
      background: #f5f5fa;
      border-color: #ddd;
    }

    /* ==================== RESPONSIVE ==================== */
    @media (max-width: 640px) {
      .resume {
        padding: 100px 20px 60px;
      }

      .resume-exp__header {
        flex-direction: column;
        gap: 2px;
      }

      .resume-langs {
        grid-template-columns: 1fr;
      }

      .resume-contact {
        flex-direction: column;
        gap: 10px;
      }

      .resume-product {
        padding: 20px;
      }
    }
  </style>
</head>
