<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tennis Simulator — Session</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/hud.css">

  <script type="importmap">
  {
    "imports": {
      "three": "./js/lib/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.168.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <!-- 3D Canvas -->
  <canvas id="viewport"></canvas>

  <!-- Slam selector + back -->
  <div id="top-bar">
    <a href="index.html" class="back-btn">← Menu</a>
    <div id="slam-selector">
      <button class="slam-btn active" data-slam="australian">🇦🇺 AO</button>
      <button class="slam-btn" data-slam="roland">🇫🇷 RG</button>
      <button class="slam-btn" data-slam="wimbledon">🇬🇧 WIM</button>
      <button class="slam-btn" data-slam="usopen">🇺🇸 USO</button>
    </div>
  </div>

  <!-- HUD: Session stats (top-left) -->
  <div class="hud-panel hud-top-left" id="hud-stats">
    <div class="hud-row">
      <span class="hud-label">Time</span>
      <span class="hud-val" id="timer-val">0:00</span>
    </div>
    <div class="hud-row">
      <span class="hud-label">Hits</span>
      <span class="hud-val hud-val--green" id="hits-val">0</span>
    </div>
    <div class="hud-row">
      <span class="hud-label">Misses</span>
      <span class="hud-val hud-val--red" id="misses-val">0</span>
    </div>
    <div class="hud-row">
      <span class="hud-label">Acc</span>
      <span class="hud-val" id="accuracy-val">—</span>
    </div>
  </div>

  <!-- HUD: Shot quality (top-right) -->
  <div class="hud-panel hud-top-right" id="hud-quality">
    <div class="hud-row">
      <span class="hud-label">Speed</span>
      <span class="hud-val" id="speed-val">—</span>
    </div>
    <div class="hud-row">
      <span class="hud-label">Score</span>
      <span class="hud-val hud-val--accent" id="quality-val">—</span>
    </div>
  </div>

  <!-- Hit result feedback (large overlay) -->
  <div id="hit-feedback" class="hit-feedback"></div>

  <!-- Current shot label -->
  <div id="shot-label"></div>

  <!-- Tennis Scoreboard -->
  <div id="scoreboard">
    <div class="sb-col-labels">
      <span></span><span>S</span><span>G</span><span>P</span>
    </div>
    <div class="sb-row">
      <div class="sb-name sb-you">YOU</div>
      <div class="sb-cell" id="sb-sets-p">0</div>
      <div class="sb-cell" id="sb-games-p">0</div>
      <div class="sb-cell sb-pts" id="sb-pts-p">0</div>
    </div>
    <div class="sb-row">
      <div class="sb-name sb-cpu">CPU</div>
      <div class="sb-cell" id="sb-sets-c">0</div>
      <div class="sb-cell" id="sb-games-c">0</div>
      <div class="sb-cell sb-pts" id="sb-pts-c">0</div>
    </div>
  </div>

  <!-- Game Over Banner -->
  <div id="game-over" style="display:none">
    <div class="go-title" id="go-title">You Win!</div>
    <div class="go-sub" id="go-sub"></div>
    <button class="go-btn" onclick="location.reload()">Play Again</button>
  </div>

  <!-- Controls hint -->
  <div id="controls-hint">
    <span>SPACE — Swing</span>
    <span>← → — Direction</span>
    <span>R — New ball</span>
    <span>F — Fullscreen</span>
  </div>

  <!-- Mobile tap-to-swing button -->
  <button id="swing-btn" class="swing-btn">HIT</button>

  <script type="module" src="js/app.js"></script>
</body>
</html>
